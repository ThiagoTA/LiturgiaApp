<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconClip">
      <rect x="190" y="40" width="300" height="300" rx="72"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13141C"/>
      <stop offset="100%" stop-color="#0D0E13"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEE9DC" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#C8A86B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9B6DC5" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="candleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="50%" stop-color="#2A2440"/>
      <stop offset="100%" stop-color="#1A1828"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#C8A86B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9B6DC5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1C2A"/>
      <stop offset="100%" stop-color="#16141F"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A2545"/>
      <stop offset="100%" stop-color="#1E1B35"/>
    </linearGradient>
  </defs>

  <!-- background rounded rect -->
