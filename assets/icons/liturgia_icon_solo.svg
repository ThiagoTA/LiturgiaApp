    <!-- flame outer -->
    <path d="M340 80 C328 95 320 108 322 120 C324 132 332 138 340 138 C348 138 356 132 358 120 C360 108 352 95 340 80Z" fill="url(#flameGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- flame inner core -->
    <path d="M340 98 C335 106 333 114 335 121 C337 128 340 131 340 131 C340 131 343 128 345 121 C347 114 345 106 340 98Z" fill="#EEE9DC" fill-opacity="0.75" style="fill:rgb(238, 233, 220);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- flame tip -->
    <ellipse cx="340" cy="88" rx="4" ry="5" fill="#EEE9DC" fill-opacity="0.5" style="fill:rgb(238, 233, 220);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- warm halo -->
    <ellipse cx="340" cy="128" rx="30" ry="10" fill="#C8A86B" fill-opacity="0.12" style="fill:rgb(200, 168, 107);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>

  <!-- label -->
  <text x="340" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#EEE9DC" fill-opacity="0.9" letter-spacing="3" style="fill:rgb(238, 233, 220);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:22px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LITURGIA</text>
  <text x="340" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#9B6DC5" fill-opacity="0.8" letter-spacing="5" style="fill:rgb(155, 109, 197);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">DIÁRIA</text>

  <!-- decorative line -->
  <line x1="280" y1="425" x2="338" y2="425" stroke="#9B6DC5" stroke-width="0.8" stroke-opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(155, 109, 197);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="425" r="2" fill="#9B6DC5" fill-opacity="0.6" style="fill:rgb(155, 109, 197);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="342" y1="425" x2="400" y2="425" stroke="#9B6DC5" stroke-width="0.8" stroke-opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(155, 109, 197);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

