  <rect x="190" y="40" width="300" height="300" rx="72" fill="none" stroke="#9B6DC5" stroke-width="1.5" stroke-opacity="0.35" style="fill:none;stroke:rgb(155, 109, 197);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

